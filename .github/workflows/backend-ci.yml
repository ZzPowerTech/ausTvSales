name: Backend CI

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: austv_sales
          POSTGRES_PASSWORD: austv_sales_dev
          POSTGRES_DB: austv_sales
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U austv_sales -d austv_sales"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://austv_sales:austv_sales_dev@localhost:5432/austv_sales
      # Non-secret CI values: the e2e suite boots the app, which validates these
      # at startup. Real production secrets live outside the repo.
      DISCORD_CLIENT_ID: ci-discord-client-id
      DISCORD_CLIENT_SECRET: ci-discord-client-secret
      DISCORD_REDIRECT_URI: http://localhost:3000/auth/discord/callback
      ALLOWED_DISCORD_IDS: '111111111111111111,222222222222222222'
      SESSION_JWT_SECRET: ci-session-secret-for-e2e-suite-0123456789

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Run migrations
        run: npm run db:migrate

      - name: E2E tests
        run: npm run test:e2e
