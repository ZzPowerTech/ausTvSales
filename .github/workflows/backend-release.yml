name: backend-release

# Ao publicar um release backend-vX.Y.Z (via release-please), builda a imagem Docker
# do backend, publica no GHCR e (quando a VPS estiver configurada) faz deploy via SSH.
#
# Requer release criado por PAT (RELEASE_PLEASE_TOKEN) para o evento `release` disparar.

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    if: startsWith(github.event.release.tag_name, 'backend-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image vars
        id: img
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${TAG#backend-v}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$owner/austvsales-backend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ steps.img.outputs.version }}
            ${{ steps.img.outputs.image }}:latest

      # -------------------------------------------------------------------------
      # Deploy via SSH. O docker-compose.yml vive na VPS (/home/austv-sales) e o
      # servico `backend` referencia a imagem publicada acima no GHCR.
      # Se o package do GHCR for privado, a VPS precisa de `docker login ghcr.io`
      # previo (ou um ~/.docker/config.json com credencial de pull).
      # Verificacao de host key (anti-MITM): o input `fingerprint` recebe o SHA256
      # da host key da VPS via secret VPS_SSH_FINGERPRINT. Obtenha com:
      #   ssh-keyscan <host> | ssh-keygen -lf - (use a linha ed25519/rsa desejada).
      # Se o secret estiver vazio, a action nao verifica (comportamento atual) —
      # setar o secret ativa a protecao sem mais mudancas no workflow.
      # Acao de terceiro pinada por commit SHA (supply-chain); atualizar junto com a tag.
      # -------------------------------------------------------------------------
      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          fingerprint: ${{ secrets.VPS_SSH_FINGERPRINT }}
          script: |
            set -e
            cd /home/austv-sales
            docker compose pull backend
            docker compose up -d backend
