name: backend-release

# Ao publicar um release backend-vX.Y.Z (via release-please), builda a imagem Docker
# do backend, publica no GHCR e (quando a VPS estiver configurada) faz deploy via SSH.
#
# Disparo:
#  - release: published — fluxo normal (release-please cria a tag).
#    Requer release criado por PAT (RELEASE_PLEASE_TOKEN) para o evento disparar.
#  - workflow_dispatch — re-disparo manual por tag. Um run de release que azara um
#    hiccup de runner (job preso em `queued`) fica marcado como nao-reexecutavel
#    pelo GitHub; este gatilho reconstroi e reimplanta a mesma tag sem depender do
#    "re-run" nativo nem de deletar/recriar o release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag do release a (re)construir e implantar (ex.: backend-v0.10.1)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    # Reage ao release do backend, ou a um dispatch manual cuja tag seja do backend.
    # `release` traz a tag em github.event.release.tag_name; no dispatch ela vem do
    # input, entao o `||` cobre os dois casos sem ramificar por event_name.
    if: startsWith(github.event.release.tag_name || inputs.tag, 'backend-v')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Sempre a partir da tag resolvida: no dispatch o ref padrao seria o
          # branch default e construiria o codigo errado.
          ref: ${{ steps.tag.outputs.tag }}

      - name: Resolve image vars
        id: img
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          version="${TAG#backend-v}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$owner/austvsales-backend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ steps.img.outputs.version }}
            ${{ steps.img.outputs.image }}:latest

      # -------------------------------------------------------------------------
      # Deploy via SSH. O docker-compose.yml vive na VPS (/home/austv-sales) e o
      # servico `backend` referencia a imagem publicada acima no GHCR.
      # Se o package do GHCR for privado, a VPS precisa de `docker login ghcr.io`
      # previo (ou um ~/.docker/config.json com credencial de pull).
      # Verificacao de host key (anti-MITM): o input `fingerprint` recebe o SHA256
      # da host key da VPS via secret VPS_SSH_FINGERPRINT. Obtenha com:
      #   ssh-keyscan <host> | ssh-keygen -lf - (use a linha ed25519/rsa desejada).
      # Se o secret estiver vazio, a action nao verifica (comportamento atual) —
      # setar o secret ativa a protecao sem mais mudancas no workflow.
      # Acao de terceiro pinada por commit SHA (supply-chain); atualizar junto com a tag.
      # -------------------------------------------------------------------------
      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          fingerprint: ${{ secrets.VPS_SSH_FINGERPRINT }}
          script: |
            set -e
            cd /home/austv-sales
            docker compose pull backend
            docker compose up -d backend
