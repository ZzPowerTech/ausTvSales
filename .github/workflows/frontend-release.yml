name: frontend-release

# Ao publicar um release frontend-vX.Y.Z (via release-please), builda a imagem
# Docker do frontend (Nginx servindo o bundle Angular), publica no GHCR e (quando
# a VPS estiver configurada) faz deploy via SSH.
#
# Requer release criado por PAT (RELEASE_PLEASE_TOKEN) para o evento `release` disparar.

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    if: startsWith(github.event.release.tag_name, 'frontend-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image vars
        id: img
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${TAG#frontend-v}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$owner/austvsales-frontend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ steps.img.outputs.version }}
            ${{ steps.img.outputs.image }}:latest

      # -------------------------------------------------------------------------
      # Deploy via SSH. O docker-compose.yml vive na VPS (/opt/austv-sales) e o
      # servico `frontend` referencia a imagem publicada acima no GHCR.
      # Se o package do GHCR for privado, a VPS precisa de `docker login ghcr.io`
      # previo (ou um ~/.docker/config.json com credencial de pull).
      # Hardening opcional: setar o secret VPS_SSH_HOST_KEY (conteudo do known_hosts)
      # e passar `fingerprint:` para nao aceitar host desconhecido cegamente.
      # -------------------------------------------------------------------------
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/austv-sales
            docker compose pull frontend
            docker compose up -d frontend
