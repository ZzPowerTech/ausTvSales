name: plugin-release

# Publica o .jar do plugin como asset do GitHub Release quando o release-please
# cria uma tag `plugin-vX.Y.Z`. Gera tambem um .jar.sha256 usado pelo auto-update
# do plugin (PR #3) para validar a integridade do download antes de aplicar.
#
# Requer que o release do plugin tenha sido criado por um PAT (RELEASE_PLEASE_TOKEN):
# releases criados pelo GITHUB_TOKEN nativo nao disparam o evento `release`.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-jar:
    # release-please cria um release por componente; reage apenas aos do plugin.
    if: startsWith(github.event.release.tag_name, 'plugin-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        working-directory: plugin
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Generate checksum
        working-directory: plugin/build/libs
        run: |
          jar=$(ls austv-sales-plugin-*.jar | grep -vE '\-(sources|javadoc)\.jar$' | head -n1)
          sha256sum "$jar" > "$jar.sha256"
          echo "PLUGIN_JAR=$jar" >> "$GITHUB_ENV"

      - name: Upload assets to release
        working-directory: plugin/build/libs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$PLUGIN_JAR" "$PLUGIN_JAR.sha256" --clobber
