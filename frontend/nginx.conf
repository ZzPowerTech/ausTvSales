server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA Angular: rotas do lado do cliente caem no index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressivo para assets versionados (hash no nome do arquivo).
  location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
