name: AusTvSales
version: '${version}'
main: de.austv.sales.AusTvSalesPlugin
api-version: '1.21'
author: AusTV
description: Registra eventos de venda de itens por cash do servidor AusTV.

# Driver JDBC da fila de fallback SQLite (S3.2). O Paper baixa do Maven Central no boot e
# disponibiliza no classpath do plugin em runtime; por isso a dependencia e compileOnly no
# build.gradle.kts (nao vai empacotada no jar).
libraries:
  - org.xerial:sqlite-jdbc:3.47.1.0

commands:
  austv-sales:
    description: Gerencia eventos de venda de itens por cash.
    usage: /<command> add <player_nick> <item_id> <total_price> <qtd>
    permission: austv.sales.admin
    permission-message: Você não tem permissão para usar este comando.

permissions:
  austv.sales.admin:
    description: Permite registrar vendas via /austv-sales.
    default: op
