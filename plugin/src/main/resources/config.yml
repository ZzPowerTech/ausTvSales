# Configuracao do AusTvSales.

# Auto-atualizacao do plugin a partir dos GitHub Releases (tags plugin-vX.Y.Z).
# No boot, o plugin checa se ha versao nova; se houver, baixa o jar para a pasta
# de update do servidor e o Paper o aplica automaticamente no proximo restart.
auto-update:
  # Liga/desliga toda a checagem de atualizacao.
  enabled: true

  # true  = apenas registra no log que ha versao nova, sem baixar.
  # false = baixa e prepara a atualizacao para o proximo restart.
  notify-only: false

  # Repositorio (owner/repo) de onde baixar os releases do plugin.
  repository: "ZzPowerTech/ausTvSales"

# Comunicacao com a API de vendas (backend NestJS).
# ATENCAO: nunca commitar a chave real. Os valores abaixo sao placeholders; injete
# base-url e api-key via secret no deploy. Com qualquer um dos dois vazio, o envio e
# DESABILITADO (fail-safe): a venda e apenas parseada e logada, sem derrubar o servidor.
api:
  # URL base da API (HTTPS em producao). Barra final e tolerada. Ex: https://sales.austv.example
  base-url: ""

  # Chave de API enviada no header X-Api-Key. Vazio = envio desabilitado.
  api-key: ""

  # Timeout de conexao e de requisicao, em milissegundos.
  timeout-ms: 5000

  # Intervalo (em minutos) de sincronizacao do cache local de itens ativos (S3.1). O plugin so
  # aceita um /austv-sales cujo item_id esteja neste cache; API desabilitada ou sem sincronizacao
  # ainda feita = cache vazio = todo comando rejeitado localmente ate o primeiro ciclo completar.
  sync-interval: 5

# Fila de fallback SQLite (S3.2) e worker de reenvio (S3.3).
queue:
  # Retencao de eventos terminais (sent/failed_permanent) antes da limpeza, em horas.
  retention-hours: 168

  # Intervalo do worker de reenvio, em segundos. Chave usada pela S3.3 (worker ainda nao
  # agendado nesta versao); documentada aqui para nao precisar de outro deploy de config.
  worker-interval-seconds: 30

  # Backoff maximo entre tentativas de um mesmo evento, em segundos. Uso futuro (S3.3).
  max-backoff-seconds: 300
